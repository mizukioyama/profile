<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mizuki Oyama</title>

  <style>
    /* ===== Reset ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ===== Card ===== */
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 40px 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .profile {
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 30px;
      color: #555;
    }

    .insta-btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366);
      color: #fff;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .insta-btn:hover {
      opacity: 0.85;
    }

    /* ===== Mobile optimization ===== */
    @media (min-width: 800px) {
      body {
        background: #e9eef3;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <div class="name">Mizuki Oyama</div>

    <div class="profile">
      Web Designer / Creator<br>
      「こだわりの創造」をテーマに<br>
      デザインとアートを制作しています。
    </div>

    <a class="insta-btn" 
       href="https://instagram.com/your_account_here" 
       target="_blank">
       Instagramを見る
    </a>
  </div>

</body>
</html>
